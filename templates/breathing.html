{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg text-center p-5">
            <h2 class="fw-bold mb-4">🌬️ Дыхание 4-7-8</h2>
            <div class="card-body">
                <p class="mb-5 text-muted">Сядьте ровно. Повторите 4 полных цикла.</p>

                <div class="mb-4">
                    <div class="display-3 fw-bold text-primary mb-2">4</div>
                    <p class="fw-bold">Вдох носом</p>
                </div>

                <div class="mb-4">
                    <div class="display-3 fw-bold text-primary mb-2">7</div>
                    <p class="fw-bold">Задержка дыхания</p>
                </div>

                <div class="mb-4">
                    <div class="display-3 fw-bold text-primary mb-2">8</div>
                    <p class="fw-bold">Выдох через рот</p>
                </div>

                <div class="mt-5 p-3 bg-light" style="border-radius: 15px;">
                    <p class="text-muted small mb-0">Эта техника мгновенно снижает уровень стресса.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
